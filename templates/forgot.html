<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="google-adsense-account" content="ca-pub-7813661458323342">
  <title>Reset Password — GitaPath</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7813661458323342" crossorigin="anonymous"></script>
</head>
<body>
<div class="simple-page">
  <div class="simple-card">
    <div class="simple-logo">🔑</div>
    <h1>Reset Your Path</h1>
    <p class="subtitle" style="text-align:center;color:var(--muted);font-size:0.85rem;margin-bottom:24px;">Enter your email to receive a reset OTP</p>

    <input class="simple-input" id="email" placeholder="Email Address" type="email"/>
    <button class="simple-btn" id="sendOtpBtn" onclick="sendOTP()">Send OTP</button>

    <div style="margin-top:20px; padding-top:20px; border-top:1px solid var(--border);">
      <input class="simple-input" id="otp" placeholder="Enter OTP"/>
      <input class="simple-input" id="password" type="password" placeholder="New Password (min. 8 chars)" oninput="checkStrength()"/>
      <div class="strength"><div class="strength-bar" id="bar"></div></div>
      <button class="simple-btn" id="resetBtn" onclick="resetPassword()">Reset Password</button>
    </div>

    <div class="simple-msg" id="msg"></div>
    <a href="/" class="simple-link">← Back to Login</a>

    <div class="gita-quote">
      <p>"Do your duty without attachment to results."</p>
      <cite>— Bhagavad Gita 2.47</cite>
    </div>
  </div>
</div>
<script>
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'simple-msg ' + type;
  }
  function checkStrength() {
    const val = document.getElementById('password').value;
    const bar = document.getElementById('bar');
    let s = 0;
    if (val.length > 6) s++;
    if (/[A-Z]/.test(val)) s++;
    if (/[0-9]/.test(val)) s++;
    if (/[^A-Za-z0-9]/.test(val)) s++;
    bar.style.width = (s * 25) + "%";
    bar.style.background = ['','#e07070','#f7931e','#f0d060','#7ab88a'][s];
  }
  async function sendOTP() {
    const email = document.getElementById('email').value.trim();
    if (!email) { showMsg('Please enter your email', 'error'); return; }
    const btn = document.getElementById('sendOtpBtn');
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      const res  = await fetch('/forgot', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:"send_otp", email }) });
      const data = await res.json();
      showMsg(data.success ? (data.message || 'OTP sent!') : (data.message || 'Failed to send OTP'), data.success ? 'success' : 'error');
    } catch(e) { showMsg('Connection failed. Try again.', 'error'); }
    btn.disabled = false; btn.textContent = 'Send OTP';
  }
  async function resetPassword() {
    const email    = document.getElementById('email').value.trim();
    const otp      = document.getElementById('otp').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !otp || !password) { showMsg('Please fill all fields', 'error'); return; }
    if (password.length < 8) { showMsg('Password must be at least 8 characters', 'error'); return; }
    const btn = document.getElementById('resetBtn');
    btn.disabled = true; btn.textContent = 'Resetting…';
    try {
      const res  = await fetch('/forgot', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:"reset_password", email, otp, password }) });
      const data = await res.json();
      if (data.success) { showMsg('Password updated! Redirecting…', 'success'); setTimeout(() => window.location.href = '/', 1500); }
      else { showMsg(data.message || 'Invalid OTP', 'error'); }
    } catch(e) { showMsg('Connection failed. Try again.', 'error'); }
    btn.disabled = false; btn.textContent = 'Reset Password';
  }
</script>
</body>
</html>
