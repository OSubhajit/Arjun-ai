<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — GitaPath</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { background: #0a0806; font-family: 'DM Sans', sans-serif; color: #e8e0cc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #110f0a; border: 1px solid #2e2616; border-radius: 20px; padding: 40px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.7); animation: fadeUp 0.6s ease; }
    @keyframes fadeUp { from {opacity:0; transform:translateY(30px);} to {opacity:1; transform:translateY(0);} }
    h2 { font-family: 'Playfair Display', serif; color: #c8a96e; text-align: center; margin-bottom: 20px; }
    input { width: 100%; padding: 12px; margin: 8px 0; background: #17130b; border: 1px solid #2e2616; border-radius: 10px; color: white; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; box-sizing: border-box; }
    input:focus { border-color: #c8a96e; }
    button { width: 100%; padding: 12px; background: linear-gradient(135deg, #c8a96e, #8b6914); border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; color: #0a0806; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.95rem; transition: opacity 0.2s; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .strength { height: 6px; border-radius: 5px; margin-top: 5px; background: #333; }
    .strength-bar { height: 100%; width: 0%; border-radius: 5px; transition: all 0.3s; }
    a { display: block; text-align: center; margin-top: 15px; color: #c8a96e; text-decoration: none; font-size: 0.85rem; }
    .msg { text-align: center; margin-top: 10px; font-size: 0.85rem; min-height: 20px; }
    .msg.success { color: #7ab88a; }
    .msg.error { color: #e07070; }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7813661458323342"
     crossorigin="anonymous"></script>
  <meta name="google-adsense-account" content="ca-pub-7813661458323342">
</head>
<body>
<div class="card">
  <h2>Reset Your Path 🔑</h2>
  <input id="email" placeholder="Email Address" type="email">
  <button id="sendOtpBtn" onclick="sendOTP()">Send OTP</button>
  <input id="otp" placeholder="Enter OTP" style="margin-top:16px;">
  <input id="password" type="password" placeholder="New Password" oninput="checkStrength()">
  <div class="strength"><div class="strength-bar" id="bar"></div></div>
  <button id="resetBtn" onclick="resetPassword()">Reset Password</button>
  <div class="msg" id="msg"></div>
  <a href="/">← Back to Login</a>
</div>
<script>
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function checkStrength() {
    const val = document.getElementById('password').value;
    const bar = document.getElementById('bar');
    let strength = 0;
    if (val.length > 6) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;
    bar.style.width = (strength * 25) + "%";
    bar.style.background = ['', 'red', 'orange', 'yellow', 'green'][strength];
  }

  async function sendOTP() {
    const email = document.getElementById('email').value.trim();
    if (!email) { showMsg('Please enter your email', 'error'); return; }
    const btn = document.getElementById('sendOtpBtn');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    try {
      const res = await fetch('/forgot', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ action: "send_otp", email })
      });
      const data = await res.json();
      if (data.success) {
        showMsg(data.message || 'OTP sent to your email!', 'success');
      } else {
        showMsg(data.message || 'Failed to send OTP', 'error');
      }
    } catch(e) {
      showMsg('Connection failed. Try again.', 'error');
    }
    btn.disabled = false;
    btn.textContent = 'Send OTP';
  }

  async function resetPassword() {
    const email = document.getElementById('email').value.trim();
    const otp = document.getElementById('otp').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !otp || !password) { showMsg('Please fill all fields', 'error'); return; }
    if (password.length < 8) { showMsg('Password must be at least 8 characters', 'error'); return; }
    const btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.textContent = 'Resetting...';
    try {
      const res = await fetch('/forgot', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ action: "reset_password", email, otp, password })
      });
      const data = await res.json();
      if (data.success) {
        showMsg('Password updated! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/', 1500);
      } else {
        showMsg(data.message || 'Invalid OTP', 'error');
      }
    } catch(e) {
      showMsg('Connection failed. Try again.', 'error');
    }
    btn.disabled = false;
    btn.textContent = 'Reset Password';
  }
</script>
</body>
</html>
