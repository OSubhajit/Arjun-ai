{% extends "base.html" %}
{% block title %}Register — GitaPath{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🪷</div>
    <h2 class="auth-title">Create Account</h2>
    <p class="auth-subtitle">Begin your journey with Arjun</p>

    <!-- Step 1: details -->
    <div id="step1-section">
      <div class="auth-field">
        <label class="auth-label">Your Name</label>
        <input class="auth-input" id="name" type="text" placeholder="Full name">
      </div>
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input class="auth-input" id="email" type="email" placeholder="you@example.com">
      </div>
      <div class="auth-field">
        <label class="auth-label">Password</label>
        <input class="auth-input" id="password" type="password" placeholder="Min. 8 characters">
      </div>
      <button class="auth-btn" id="sendOtpBtn" onclick="sendOTP()">Send OTP to Email ✦</button>
    </div>

    <!-- Step 2: OTP -->
    <div class="otp-section" id="step2-section">
      <p style="font-size:0.85rem;color:var(--muted);margin-bottom:12px;">
        OTP sent to <strong id="email-display" style="color:var(--accent);"></strong>
      </p>
      <input class="auth-input" id="otp" type="text" maxlength="6" placeholder="6-digit OTP">
      <button class="auth-btn" id="verifyBtn" onclick="verifyOTP()">Verify & Create Account ✦</button>
      <button class="auth-btn-outline" onclick="goBack()">← Change Details</button>
      <button class="auth-btn-ghost" onclick="resendOTP()">Resend OTP</button>
    </div>

    <div id="msg" class="auth-msg"></div>

    <a href="/login" class="simple-link" style="display:block;text-align:center;margin-top:16px;">
      Already have an account? Sign in →
    </a>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/register.js"></script>
{% endblock %}
