<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 480px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
    .header { background: linear-gradient(135deg, #ff6b35, #f7931e); padding: 30px; text-align: center; }
    .header h1 { color: white; margin: 0; font-size: 24px; }
    .body { padding: 30px; text-align: center; }
    .otp-box { display: inline-block; background: #fff8f0; border: 2px dashed #ff6b35; border-radius: 10px; padding: 16px 40px; margin: 20px 0; }
    .otp-box span { font-size: 38px; font-weight: bold; color: #ff6b35; letter-spacing: 8px; }
    .note { font-size: 13px; color: #999; margin-top: 10px; }
    .footer { background: #fafafa; padding: 16px; text-align: center; font-size: 12px; color: #aaa; border-top: 1px solid #eee; }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7813661458323342"
     crossorigin="anonymous"></script>
  <meta name="google-adsense-account" content="ca-pub-7813661458323342">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🧠 GitaPath — Arjun AI</h1>
    </div>
    <div class="body">
      <p>Hello <strong>{{ name }}</strong>,</p>
      <p>Your OTP code is:</p>
      <div class="otp-box"><span>{{ otp }}</span></div>
      <p class="note">Valid for 10 minutes. Do not share this OTP.</p>
    </div>
    <div class="footer">© 2024 GitaPath · Made by Subhajit Sarkar</div>
  </div>
</body>
</html>
